openapi: 3.0.3
info:
  title: Student API
  description: API for Student functionalities.
  version: 1.0.0

servers:
  - url: https://college-app-316955810695.us-east1.run.app/api/v1/student

paths:
  /profile:
    get:
      operationId: studentProfileGet
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StudentProfile'

  /schedule:
    get:
      summary: Get Student Weekly Timetable
      operationId: studentScheduleGet
      description: Returns the full weekly schedule grouped by day for the student's current program and semester.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DailySchedule'

  /courses/current:
    get:
      operationId: studentCurrentCoursesGet
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseCompact'

  /curriculum:
    get:
      operationId: studentCurriculumGet
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CurriculumProgress'

  /exams/upcoming:
    get:
      operationId: studentExamsGet
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExamEvent'

  /results:
    get:
      summary: Get Student Academic History
      operationId: studentResultsGet
      description: Returns a list of all enrolled courses grouped by semester sequence (e.g., Year 1 - Semester 1). Scores are masked if results are not yet published.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Transcript'

  /finance:
    get:
      operationId: studentFinanceGet
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StudentFinance'

components:
  schemas:
    # Models remain the same as your provided spec...
    StudentProfile:
      type: object
      properties:
        student_id: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        program_name: { type: string }
        current_semester: { type: integer }
        avatar_url: { type: string, nullable: true }

    DailySchedule:
      type: object
      properties:
        day_name:
          type: string
          example: "Monday"
        is_free_day:
          type: boolean
          example: false
        classes:
          type: array
          items:
            $ref: '#/components/schemas/ClassSession'

    ClassSession:
      type: object
      properties:
        public_id: { type: string }
        course_code: { type: string }
        course_name: { type: string }
        start_time: { type: string, example: "08:00" }
        end_time: { type: string, example: "10:00" }
        location: { type: string }
        lecturer_name: { type: string }
        color_hex: { type: string }

    CourseCompact:
      type: object
      properties:
        code: { type: string }
        name: { type: string }

    CurriculumProgress:
      type: object
      properties:
        program_name: { type: string }
        total_semesters: { type: integer }
        completion_percentage: { type: number, format: float }
        semesters:
          type: array
          items:
            $ref: '#/components/schemas/CurriculumSemester'

    CurriculumSemester:
      type: object
      properties:
        title: { type: string }
        is_cleared: { type: boolean }
        is_current: { type: boolean }
        courses:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              name: { type: string }
              is_cleared: { type: boolean }

    ExamEvent:
      type: object
      properties:
        public_id:
          type: string
          description: Unique identifier for the exam paper
        title:
          type: string
          description: Course Name (e.g. Intro to Programming)
        code:
          type: string
          description: Course Code (e.g. CS101)
        date:
          type: string
          format: date
        time:
          type: string
          description: Start time (e.g. 09:00)
        duration:
          type: string
          description: formatted duration string (e.g. 120 mins)
        location:
          type: string

    Transcript:
      type: object
      properties:
        semesters:
          type: array
          items:
            $ref: '#/components/schemas/SemesterGroup'

    SemesterGroup:
      type: object
      properties:
        semester_name:
          type: string
          example: "Year 1 - Semester 1"
        results:
          type: array
          items:
            $ref: '#/components/schemas/CourseResult'

    CourseResult:
      type: object
      properties:
        course_name:
          type: string
          example: "Introduction to Computer Science"
        grade:
          type: string
          nullable: true
          description: "The letter grade (e.g., 'A', 'B', 'F') or 'N/A' if not published/ongoing."
          example: "A"
        score:
          type: number
          nullable: true
          description: "The raw score (0-100). Null if not published."
          example: 85.5
        is_published:
          type: boolean
          description: "Indicates if the result is officially released."
          example: true

    StudentFinance:
      type: object
      properties:
        balance: { type: number }
        currency: { type: string }
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/FinanceTransaction'

    FinanceTransaction:
      type: object
      properties:
        transaction_id: { type: string }
        date: { type: string, format: date }
        title: { type: string }
        type: { type: string, enum: [invoice, payment] }
        amount: { type: number }

